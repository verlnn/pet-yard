spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/petyard
    username: petyard
    password: petyard
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  storage:
    upload-dir: upload/images
    public-url-prefix: /upload/images
  mail:
    from: no-reply@pet-yard.local

jwt:
  secret: dev-secret-change-me-please-32bytes-minimum

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/kakao/callback}
