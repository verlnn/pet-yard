spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: auth
  flyway:
    enabled: true
    locations: classpath:db/migration/auth,classpath:db/migration/pet,classpath:db/migration/feed,classpath:db/migration/core
    default-schema: auth
    schemas: auth,pet,feed,core

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS}

app:
  frontend-origin: ${FRONTEND_ORIGIN}
  frontend-origin-www: ${FRONTEND_ORIGIN_WWW}
  storage:
    upload-dir: /data/pet-yard/images
    public-url-prefix: /data/pet-yard/images
  mail:
    from: ${MAIL_FROM}

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  access-ttl-seconds: ${JWT_ACCESS_TTL}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL}

animal:
  registration:
    service-key: ${ANIMAL_SERVICE_KEY}

server:
  tomcat:
    max-part-count: 15

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG