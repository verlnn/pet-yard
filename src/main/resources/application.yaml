spring:
  application:
    name: pet-yard
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petyard}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:petyard}
    password: ${DB_PASSWORD:petyard}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  # TODO: 운영 환경에서는 반드시 안전한 랜덤 키로 교체
  secret: dev-secret-change-me-please-32bytes-minimum
  access-ttl-seconds: 3600
  refresh-ttl-seconds: 1209600
