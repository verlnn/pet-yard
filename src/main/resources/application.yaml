spring:
  application:
    name: pet-yard
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petyard}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:petyard}
    password: ${DB_PASSWORD:petyard}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: auth
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/auth,classpath:db/migration/pet,classpath:db/migration/feed,classpath:db/migration/core
    default-schema: auth
    schemas: auth
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

app:
  feed:
    initial-load-size: ${APP_FEED_INITIAL_LOAD_SIZE:10}
    max-load-size: ${APP_FEED_MAX_LOAD_SIZE:20}
  storage:
    upload-dir: uploads
    public-url-prefix: /uploads
  mail:
    from: ${MAIL_FROM:no-reply@pet-yard.local}

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    authorize-url: ${KAKAO_AUTHORIZE_URL:https://kauth.kakao.com/oauth/authorize}
    token-url: ${KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}
    user-info-url: ${KAKAO_USERINFO_URL:https://kapi.kakao.com/v2/user/me}

jwt:
  # TODO: 운영 환경에서는 반드시 안전한 랜덤 키로 교체
  secret: ${JWT_SECRET:dev-secret-change-me-please-32bytes-minimum}
  access-ttl-seconds: ${JWT_ACCESS_TTL:3600}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:1209600}

logging:
  level:
    root: INFO
    io.pet.petyard: INFO

server:
  tomcat:
    max-part-count: 15
