spring:
  datasource:
    url: jdbc:h2:mem:petyard-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false

jwt:
  secret: dev-secret-change-me-please-32bytes-minimum
  access-ttl-seconds: 3600
  refresh-ttl-seconds: 1209600
